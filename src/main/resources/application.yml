#spring.application.name=jp40-capacitacao-2026
#spring.jpa.hibernate.ddl-auto=update
spring:
  application:
    name: jp40-capacitacao-2026

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: true
    hibernate:
      ddl-auto: update

  datasource:
    url: ${URL_DB:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
    username: ${USERNAME_DB:APP_JP}
    password: ${PASSWORD_DB:123456}
    driverClassName: oracle.jdbc.driver.OracleDriver

server:
  port: 9090
